<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Το ellinismos μου (Centered 3D)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #e5e5e5;
            font-family: sans-serif;
            overflow: hidden; /* Αποτρέπει τις μπάρες κύλισης */
        }

        /* Το κουτί του βιβλίου με εφέ 3D βάθους */
        .book-container {
            position: relative;
            width: 470px; /* Πλάτος μίας σελίδας */
            height: 606px;
            perspective: 1500px; /* Δίνει την αίσθηση του 3D χώρου */
            
            /* ΜΕΤΑΚΙΝΗΣΗ ΠΡΟΣ ΤΑ ΔΕΞΙΑ: */
            /* Σπρώχνουμε το βιβλίο δεξιά κατά το μισό του πλάτος */
            /* έτσι ώστε όταν ανοίγει αριστερά, να φαίνεται τέλεια κεντραρισμένο */
            margin-left: 420px; 
        }

        /* Κάθε φύλλο του βιβλίου */
        .sheet {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
            transform-origin: left center; /* Το ξεφύλλισμα γίνεται από τα αριστερά */
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        /* Η μπροστά και η πίσω όψη κάθε φύλλου */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden; /* Κρύβει την πίσω πλευρά όταν γυρίζει */
            box-shadow: inset 0px 0px 20px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.2);
            background-color: #fff;
        }

        /* Η πίσω όψη πρέπει να είναι γυρισμένη κατά 180 μοίρες */
        .page.back {
            transform: rotateY(180deg);
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Όταν ένα φύλλο γυρίζει (ανοίγει) */
        .sheet.flipped {
            transform: rotateY(-180deg);
        }

        .controls {
            margin-top: -10px;
            /* Μετακινούμε και τα κουμπιά λίγο αριστερά για να είναι */
            /* ευθυγραμμισμένα με το κέντρο του ανοιχτού βιβλίου */
            margin-right: -420px; 
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            margin: 0 5px;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="book-container">
        
        <!-- Φύλλο 1 (Περιέχει Σελίδα 1 & Σελίδα 2) -->
        <div class="sheet" id="sheet1" style="z-index: 5;">
            <div class="page front"><img src="page1.png" alt="page1"></div>
            <div class="page back"><img src="page2.png" alt="page2"></div>
        </div>

        <!-- Φύλλο 2 (Περιέχει Σελίδα 3 & Σελίδα 4) -->
        <div class="sheet" id="sheet2" style="z-index: 4;">
            <div class="page front"><img src="page3.png" alt="page3"></div>
            <div class="page back"><img src="page4.png" alt="page4"></div>
        </div>

        <!-- Φύλλο 3 (Περιέχει Σελίδα 5 & Σελίδα 6) -->
        <div class="sheet" id="sheet3" style="z-index: 3;">
            <div class="page front"><img src="page5.png" alt="page5"></div>
            <div class="page back"><img src="page6.png" alt="page6"></div>
        </div>

        <!-- Φύλλο 4 (Περιέχει Σελίδα 7 & Σελίδα 8) -->
        <div class="sheet" id="sheet4" style="z-index: 2;">
            <div class="page front"><img src="page7.png" alt="page7"></div>
            <div class="page back"><img src="page8.png" alt="page8"></div>
        </div>

        <!-- Φύλλο 5 (Περιέχει Σελίδα 9 και μια κενή λευκή πίσω) -->
        <div class="sheet" id="sheet5" style="z-index: 1;">
            <div class="page front"><img src="page9.png" alt="page9"></div>
            <div class="page back" style="background:#fff;"></div>
        </div>

    </div>

    <div class="controls">
        <button id="prevBtn" disabled>Προηγούμενη</button>
        <button id="nextBtn">Επόμενη</button>
    </div>

    <script>
        const sheets = [
            document.getElementById('sheet1'),
            document.getElementById('sheet2'),
            document.getElementById('sheet3'),
            document.getElementById('sheet4'),
            document.getElementById('sheet5')
        ];
        
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        let currentSheetIndex = 0;

        function updateButtons() {
            prevBtn.disabled = currentSheetIndex === 0;
            nextBtn.disabled = currentSheetIndex === sheets.length;
        }

        nextBtn.addEventListener('click', () => {
            if (currentSheetIndex < sheets.length) {
                sheets[currentSheetIndex].classList.add('flipped');
                sheets[currentSheetIndex].style.zIndex = 10 + currentSheetIndex;
                currentSheetIndex++;
                updateButtons();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentSheetIndex > 0) {
                currentSheetIndex--;
                sheets[currentSheetIndex].classList.remove('flipped');
                sheets[currentSheetIndex].style.zIndex = sheets.length - currentSheetIndex;
                updateButtons();
            }
        });
    </script>

</body>
</html>
